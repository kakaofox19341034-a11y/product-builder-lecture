<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle">Dark Mode</button>
    <div class="container">
        <h1>Lotto Number Generator</h1>
        <div class="lotto-numbers"></div>
        <button id="generate-btn">Generate Numbers</button>
    </div>

    <div class="container partnership-container">
        <h2>제휴 문의</h2>
        <form action="https://formspree.io/f/mbdpodpo" method="POST" class="partnership-form">
            <div class="form-group">
                <label for="name">이름 / 업체명</label>
                <input type="text" id="name" name="name" required placeholder="이름 또는 업체명을 입력하세요">
            </div>
            <div class="form-group">
                <label for="email">이메일 주소</label>
                <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" required placeholder="문의하실 내용을 입력하세요" rows="5"></textarea>
            </div>
            <button type="submit" class="submit-btn">제휴 문의하기</button>
        </form>
    </div>
    <script src="main.js"></script>
</body>
</html>
