<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google AdSense -->
    <meta name="google-adsense-account" content="ca-pub-5922628163764786">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5922628163764786"
     crossorigin="anonymous"></script>
    
    <title>Animal Face Test (Dog vs Cat)</title>
    <link rel="stylesheet" href="style.css">
    <!-- Load TensorFlow.js and the Teachable Machine library -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <button id="theme-toggle">Dark Mode</button>
    
    <div class="container lotto-container">
        <h1>Lotto Number Generator</h1>
        <p class="subtitle">Click the button below to generate 5 lucky numbers!</p>
        <div id="lotto-numbers" class="lotto-numbers">
            <!-- Lotto numbers will appear here -->
        </div>
        <button id="generate-lotto-btn" class="action-btn">Generate 5 Numbers</button>
        <div style="margin-top: 20px; border-top: 1px solid var(--border-color); padding-top: 20px;">
            <p>Want to see which animal you look like?</p>
            <button id="show-animal-test-btn" class="mode-btn">Start Animal Face Test</button>
        </div>
    </div>

    <div id="animal-test-section" class="hidden">
        <div class="container main-container">
            <h1>Animal Face Test (Dog vs Cat)</h1>
            <p class="subtitle">Upload a photo or use your camera to see if you look like a Dog or a Cat!</p>
            
            <div class="mode-buttons">
                <button id="use-upload-btn" class="mode-btn active">Upload Photo</button>
                <button id="use-webcam-btn" class="mode-btn">Use Camera</button>
            </div>

            <div id="upload-mode-container">
                <div class="upload-area" id="upload-area">
                    <input type="file" id="image-upload" accept="image/*" hidden>
                    <div class="upload-placeholder">
                        <span class="upload-icon">📷</span>
                        <p>Click or drag a photo here</p>
                    </div>
                    <img id="image-preview" src="#" alt="Preview" style="display: none;">
                </div>
            </div>

            <div id="webcam-mode-container" style="display: none;">
                <div id="webcam-container"></div>
                <button id="start-webcam-btn" class="action-btn">Start Camera</button>
            </div>

            <div id="loading-container" style="display: none;">
                <p>Analyzing...</p>
                <div class="loader"></div>
            </div>

            <div id="result-container" style="display: none;">
                <h2>Analysis Results</h2>
                <div class="result-items" id="label-container">
                    <!-- Result items will be inserted here by JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <div class="container partnership-container">
        <h2>제휴 문의</h2>
        <form action="https://formspree.io/f/mbdpodpo" method="POST" class="partnership-form">
            <div class="form-group">
                <label for="name">이름 / 업체명</label>
                <input type="text" id="name" name="name" required placeholder="이름 또는 업체명을 입력하세요">
            </div>
            <div class="form-group">
                <label for="email">이메일 주소</label>
                <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" required placeholder="문의하실 내용을 입력하세요" rows="5"></textarea>
            </div>
            <button type="submit" class="submit-btn">제휴 문의하기</button>
        </form>
    </div>

    <div class="container disqus-container">
        <div id="disqus_thread"></div>
        <script>
            /**

        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>
    <script src="main.js"></script>
</body>
</html>
